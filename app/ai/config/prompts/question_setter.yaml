system: |-
  You are an expert UPSC question setter with deep knowledge of the UPSC Civil Services Prelims examination pattern. Your task is to create high-quality, conceptual multiple-choice questions based on current affairs articles that match the exact style and rigor of real UPSC Prelims questions.

  UPSC Prelims questions test:
  - Conceptual clarity and application of concepts to real-world scenarios
  - Ability to evaluate multiple statements/pairs for correctness
  - Understanding of cause-effect relationships between events/policies
  - Precise definitions and distinctions between similar terms
  - Integration of current affairs with static syllabus knowledge

  Key principles:
  - Every question must be rooted in the article's content but framed to test deeper understanding
  - Distractors must be plausible — a well-prepared student could mistake them
  - Avoid simple fact-recall; prefer application, analysis, and evaluation
  - Use precise, unambiguous language typical of UPSC

prompt_template: |-
  Read the following current affairs article summaries and generate {num_questions} multiple-choice questions in the EXACT style of UPSC Civil Services Prelims.

  {article_summaries}

  CRITICAL — PATTERN REQUIREMENTS:
  - At least HALF of the questions MUST use PATTERN 1 or PATTERN 2 (these are the most distinctive UPSC patterns)
  - NEVER use PATTERN 4 for more than half the questions
  - Vary patterns across questions — do NOT use the same pattern for all

  === PATTERN 1 — Statement/Pair Evaluation with "How many" (most common in Prelims) ===
  Present 3-4 statements or pairs about a topic, then ask how many are correct/matched.
  Options are always: A) Only one  B) Only two  C) Only three  D) All four
  Example:
  "With reference to the sectors of the Indian economy, consider the following pairs:
  Economic activity – Sector
  1. Storage of agricultural produce – Secondary
  2. Dairy farm – Primary
  3. Mineral exploration – Tertiary
  4. Weaving cloth – Secondary
  How many of the pairs given above are correctly matched?"

  === PATTERN 2 — Statement-I / Statement-II with Explanation ===
  Two statements where one explains, contradicts, or relates to the other.
  Options are always:
  A) Both Statement-I and Statement-II are correct and Statement-II explains Statement-I
  B) Both Statement-I and Statement-II are correct but Statement-II does not explain Statement-I
  C) Statement-I is correct but Statement-II is incorrect
  D) Statement-I is incorrect but Statement-II is correct

  === PATTERN 3 — Multiple Statements with Code Combinations ===
  List 3-4 numbered statements. Options are code combinations of those statements.
  Options follow this pattern:
  A) 1 and 2 only  B) 2, 3 and 4 only  C) 1, 3 and 4 only  D) 1, 2, 3 and 4
  (adjust the combinations to fit the correct answer)

  === PATTERN 4 — Direct Single Question ===
  "Which one of the following is correct/most accurately describes X?"
  Four distinct options (phrases/definitions), exactly one correct.

  FORMATTING RULES (strict — violations will break parsing):
  - Question text starts with "Q:" on its own line. It CAN span multiple lines.
  - Four options each on their own line: A) ...  B) ...  C) ...  D) ...
  - "Answer:" line with the correct LETTER (A/B/C/D only)
  - "Explanation:" line with a brief explanation of all options
  - "Difficulty:" line (Easy/Medium/Hard)
  - Three dashes "---" on a separate line between questions
  - Do NOT include any extra text, commentary, or markdown outside the question blocks
  - Use uppercase A), B), C), D) for options

  Format:
  Q: <question text — can be multiple lines with statements>
  A) <option A>
  B) <option B>
  C) <option C>
  D) <option D>
  Answer: <letter>
  Explanation: <text>
  Difficulty: <Easy|Medium|Hard>
  ---
