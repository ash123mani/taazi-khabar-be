name: Daily RSS Scrape

on:
  schedule:
    # 2:30 UTC = 8:00 AM IST, 8:30 UTC = 2:00 PM IST
    - cron: '30 2,8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NIM_SUMMARIZER_API_KEY: ${{ secrets.NIM_SUMMARIZER_API_KEY }}
          NIM_QUESTION_SETTER_API_KEY: ${{ secrets.NIM_QUESTION_SETTER_API_KEY }}
        run: python -m app.scripts.cron_scrape
